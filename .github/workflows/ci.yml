name: CI Workflow

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  build-and-test:
    runs-on: ubuntu-latest

    steps:
    - uses: actions/checkout@v3

    - name: Setup Node.js
      uses: actions/setup-node@v3
      with:
        node-version: '18'
        cache: 'npm'

    - name: Install Monorepo Dependencies
      run: npm install

    # We will add tests here once bot and webapp are initialized
    # - name: Run Bot Tests
    #   run: npm run test --workspace=bot

    # - name: Run Webapp Tests
    #   run: npm run test --workspace=webapp
